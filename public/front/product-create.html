<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear producto</title>

<link rel="stylesheet" href="styles.css">


</head>

  <link rel="stylesheet" href="styles.css">


<body>

<h1>Crear nuevo producto</h1>

<div class="card">

<label>Nombre</label>
<input id="name">

<label>Descripción</label>
<textarea id="description"></textarea>

<label>Precio</label>
<input id="price" type="number" step="0.01">

<label>Imagen</label>
<input type="file" id="imageFile" accept="image/*">

<img id="preview" style="display:none">

<br><br>

<button id="saveBtn">Guardar producto</button>
<a href="index.html"><button>Cancelar</button></a>

<p id="msg"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

//const API = "http://127.0.0.1:8000/api";
const API = "https://catalogo-favs-production.up.railway.app/api";


/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyBduveofhdf5SU9c53bcjM7u8msitgNbU8",
  authDomain: "catalogo-favs.firebaseapp.com",
  projectId: "catalogo-favs",
  storageBucket: "catalogo-favs.firebasestorage.app",
  messagingSenderId: "1018674986767",
  appId: "1:1018674986767:web:39fa2feee97d9af6b4487a"
};

firebase.initializeApp(firebaseConfig);
const STORAGE = firebase.storage();

/* verificar admin */

async function ensureAdmin(){

const token = localStorage.getItem("token");

if(!token){
alert("Debes iniciar sesión");
window.location.href="login.html";
return;
}

const res = await fetch(API+"/profile",{
headers:{
Authorization:"Bearer "+token,
Accept:"application/json"
}
});

if(!res.ok){
alert("No autorizado");
window.location.href="index.html";
return;
}

const user = await res.json();

if(!user.is_admin){
alert("Solo administradores");
window.location.href="index.html";
}

}

ensureAdmin();

/* preview imagen */

document.getElementById("imageFile").addEventListener("change",e=>{

const file=e.target.files[0];
if(!file)return;

const url=URL.createObjectURL(file);

const img=document.getElementById("preview");
img.src=url;
img.style.display="block";

});

/* subir imagen */

async function uploadImage(file){

const safeName=file.name.replace(/\s+/g,"_");

const path=`products/${Date.now()}_${safeName}`;

const ref=STORAGE.ref().child(path);

await ref.put(file);

return await ref.getDownloadURL();

}

/* guardar producto */

document.getElementById("saveBtn").addEventListener("click",async()=>{

const name=document.getElementById("name").value;
const description=document.getElementById("description").value;
const price=document.getElementById("price").value;
const file=document.getElementById("imageFile").files[0];

if(!name||!description||!price){
alert("Completa todos los campos");
return;
}

let image_url="";

if(file){
image_url=await uploadImage(file);
}

const token=localStorage.getItem("token");

const res=await fetch(API+"/products",{
method:"POST",
headers:{
"Content-Type":"application/json",
Accept:"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
name,
description,
price,
image_url
})
});

const data=await res.json();

if(!res.ok){
alert(data.message||"Error creando producto");
return;
}

alert("Producto creado");

window.location.href="index.html";

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Catálogo</title>

<style>
body{
    font-family: Arial;
    margin:40px;
    background:#f5f5f5;
}

h1{
    color:#333;
}

.product{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}

img{
    max-width:120px;
}

button{
    padding:8px 12px;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Mini Catálogo de Productos</h1>

<p>
<a href="login.html">Iniciar sesión</a> |
<a href="register.html">Registrarse</a> |
<a href="favorites.html">Mis favoritos</a>
<button id="logoutBtn" type="button">Cerrar sesión</button>
<a id="adminLink" href="admin.html" style="display:none;">Panel Admin</a>
<button id="newProductBtn" type="button" style="display:none;">+ Nuevo producto</button>
</p>

<hr>

<h2>Frase aleatoria de Chuck Norris</h2>
<p id="joke">Cargando frase...</p>

<hr>

<h2>Productos</h2>

<button onclick="loadProducts()">Cargar productos</button>

<div id="products"></div>

<input type="file" id="imagePicker" accept="image/*" style="display:none;">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
const API = "http://127.0.0.1:8000/api";

const firebaseConfig = {
  apiKey: "AIzaSyBduveofhdf5SU9c53bcjM7u8msitgNbU8",
  authDomain: "catalogo-favs.firebaseapp.com",
  projectId: "catalogo-favs",
  storageBucket: "catalogo-favs.firebasestorage.app",
  messagingSenderId: "1018674986767",
  appId: "1:1018674986767:web:39fa2feee97d9af6b4487a"
};

firebase.initializeApp(firebaseConfig);
const FB_STORAGE = firebase.storage();

let IS_ADMIN = false;

async function uploadImageToFirebase(file) {
  if (!file.type.startsWith("image/")) {
    throw new Error("Solo se permiten imágenes");
  }

  if (file.size > 2 * 1024 * 1024) {
    throw new Error("La imagen no debe superar 2 MB");
  }

  const safeName = file.name.replace(/\s+/g, "_");
  const path = `products/${Date.now()}_${safeName}`;
  const ref = FB_STORAGE.ref().child(path);

  await ref.put(file);
  const url = await ref.getDownloadURL();
  return url;
}

function pickImageFile() {
  return new Promise((resolve) => {
    const input = document.getElementById("imagePicker");

    if (!input) {
      resolve(null);
      return;
    }

    input.value = "";

    input.onchange = () => {
      resolve(input.files && input.files[0] ? input.files[0] : null);
    };

    input.click();
  });
}

fetch("https://api.chucknorris.io/jokes/random")
  .then(res => res.json())
  .then(data => {
    document.getElementById("joke").innerText = data.value;
  })
  .catch(() => {
    document.getElementById("joke").innerText = "No se pudo cargar la frase.";
  });

async function detectAdmin() {
  const token = localStorage.getItem("token");
  if (!token) return;

  const res = await fetch(API + "/profile", {
    headers: { Authorization: "Bearer " + token, Accept: "application/json" }
  });

  if (!res.ok) return;

  const user = await res.json();
  IS_ADMIN = !!user.is_admin;

  if (IS_ADMIN) {
    document.getElementById("adminLink").style.display = "inline";
    document.getElementById("newProductBtn").style.display = "inline-block";
  }
}

function loadProducts() {
  fetch(API + "/products")
    .then(res => res.json())
    .then(products => {
      const container = document.getElementById("products");
      container.innerHTML = "";

      products.forEach(p => {
        const imageHtml = p.image_url
          ? `<img src="${p.image_url}" alt="${p.name}">`
          : `<p>Sin imagen</p>`;

        container.innerHTML += `
          <div class="product">
            <h3>${p.name}</h3>
            <p>${p.description}</p>
            <strong>Precio: $${p.price}</strong>
            <br>
            ${imageHtml}
            <br><br>

            <a href="product.html?id=${p.id}">
              <button type="button">Ver detalle</button>
            </a>

            ${IS_ADMIN ? `
              <button class="editBtn"
                data-id="${p.id}"
                data-name="${encodeURIComponent(p.name ?? '')}"
                data-description="${encodeURIComponent(p.description ?? '')}"
                data-price="${encodeURIComponent(p.price ?? '')}"
                data-image_url="${encodeURIComponent(p.image_url ?? '')}"
                type="button"
              >Editar</button>

              <button class="deleteBtn" data-id="${p.id}" type="button">Eliminar</button>
            ` : ``}
          </div>
        `;
      });
    })
    .catch(() => {
      document.getElementById("products").innerHTML = "<p>Error cargando productos.</p>";
    });
}

document.getElementById("products").addEventListener("click", async (e) => {
  if (!IS_ADMIN) return;

  if (e.target.classList.contains("deleteBtn")) {
    const id = e.target.dataset.id;
    if (!confirm("¿Eliminar producto?")) return;

    const token = localStorage.getItem("token");
    const res = await fetch(API + "/products/" + id, {
      method: "DELETE",
      headers: { Authorization: "Bearer " + token, Accept: "application/json" }
    });

    if (!res.ok) {
      const data = await res.json();
      alert(data.message || "Error eliminando");
      return;
    }

    loadProducts();
    return;
  }

  if (e.target.classList.contains("editBtn")) {
    const id = e.target.dataset.id;

    const currentName = decodeURIComponent(e.target.dataset.name || "");
    const currentDesc = decodeURIComponent(e.target.dataset.description || "");
    const currentPrice = decodeURIComponent(e.target.dataset.price || "");
    const currentImg = decodeURIComponent(e.target.dataset.image_url || "");

    const newName = prompt("Nuevo nombre:", currentName);
    if (newName === null) return;

    const newDesc = prompt("Nueva descripción:", currentDesc);
    if (newDesc === null) return;

    const newPrice = prompt("Nuevo precio:", currentPrice);
    if (newPrice === null) return;

    let newImg = currentImg;

    const file = await pickImageFile();
    if (file) {
      if (!file) {
        alert("No seleccionaste imagen");
        return;
      }

      try {
        newImg = await uploadImageToFirebase(file);
      } catch (error) {
        console.error(error);
        alert(error.message || "Error subiendo imagen a Firebase");
        return;
      }
    }

    const token = localStorage.getItem("token");

    const res = await fetch(API + "/products/" + id, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        name: newName,
        description: newDesc,
        price: newPrice,
        image_url: newImg
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Error actualizando");
      return;
    }

    loadProducts();
  }
});

document.getElementById("newProductBtn").addEventListener("click", async () => {
  if (!IS_ADMIN) return;

  const name = prompt("Nombre del producto:");
  if (!name) return;

  const description = prompt("Descripción:");
  if (description === null) return;

  const price = prompt("Precio:");
  if (price === null) return;

  const file = await pickImageFile();
  if (!file) {
    alert("No seleccionaste imagen");
    return;
  }

  let image_url = "";
  try {
    image_url = await uploadImageToFirebase(file);
  } catch (e) {
    console.error(e);
    alert(e.message || "Error subiendo imagen a Firebase");
    return;
  }

  const token = localStorage.getItem("token");
  const res = await fetch(API + "/products", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ name, description, price, image_url })
  });

  const data = await res.json();
  if (!res.ok) {
    alert(data.message || "Error creando producto");
    return;
  }

  loadProducts();
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.removeItem("token");
  window.location.href = "login.html";
});

(async () => {
  await detectAdmin();
})();
</script>

</body>
</html>

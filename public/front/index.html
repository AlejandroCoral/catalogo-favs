<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Catálogo</title>
<link rel="stylesheet" href="styles.css">


</head>

<body>

<h1>Mini Catálogo de Productos</h1>

<div id="welcomeBox" style="display:none; background:white; padding:10px; border-radius:8px; margin-bottom:20px;">
  <strong id="welcomeText"></strong><br>
  <span id="modeText" style="color:#555;"></span>
</div>

<p>
<a id="loginLink" class="nav-link" href="login.html">Iniciar sesión</a>
<a id="registerLink" class="nav-link" href="register.html">Registrarse</a>
<a id="favoritesLink" class="nav-link" href="favorites.html">Mis favoritos</a>
<button id="logoutBtn" type="button" style="display:none;">Cerrar sesión</button>
<a id="adminLink" class="nav-link" href="admin.html" style="display:none;">Panel Admin</a>
<button id="newProductBtn" type="button" style="display:none;">+ Nuevo producto</button>
</p>

<hr>

<h2>Motívate con una de las icónicas frases de nuestro Chuck Norris</h2>
<p id="joke">Cargando frase...</p>

<hr>


<h2>Productos</h2>

<div id="products"></div>

<script>
const API = "http://127.0.0.1:8000/api";
let IS_ADMIN = false;

fetch("https://api.chucknorris.io/jokes/random")
  .then(res => res.json())
  .then(data => {
    document.getElementById("joke").innerText = data.value;
  })
  .catch(() => {
    document.getElementById("joke").innerText = "No se pudo cargar la frase.";
  });

async function detectSessionAndAdmin() {

  const token = localStorage.getItem("token");

  const loginLink = document.getElementById("loginLink");
  const registerLink = document.getElementById("registerLink");
  const logoutBtn = document.getElementById("logoutBtn");
  const adminLink = document.getElementById("adminLink");
  const newProductBtn = document.getElementById("newProductBtn");

  const welcomeBox = document.getElementById("welcomeBox");
  const welcomeText = document.getElementById("welcomeText");
  const modeText = document.getElementById("modeText");

  if (!token) {
    loginLink.style.display = "inline";
    registerLink.style.display = "inline";
    logoutBtn.style.display = "none";
    adminLink.style.display = "none";
    newProductBtn.style.display = "none";
    welcomeBox.style.display = "none";
    IS_ADMIN = false;
    return;
  }

  loginLink.style.display = "none";
  registerLink.style.display = "none";
  logoutBtn.style.display = "inline-block";

  const res = await fetch(API + "/profile", {
    headers: {
      Authorization: "Bearer " + token,
      Accept: "application/json"
    }
  });

  if (!res.ok) {
    localStorage.removeItem("token");
    window.location.reload();
    return;
  }

  const user = await res.json();

  IS_ADMIN = !!user.is_admin;

  /* extraer nombre del correo */
  const email = user.email || "";
  const username = email.split("@")[0];

  welcomeBox.style.display = "block";
  welcomeText.innerText = "Bienvenid@ " + username;

  if (IS_ADMIN) {
    adminLink.style.display = "inline";
    newProductBtn.style.display = "inline-block";
    modeText.innerText = "Modalidad: Administrador";
  } else {
    adminLink.style.display = "none";
    newProductBtn.style.display = "none";
    modeText.innerText = "Modalidad: Usuario";
  }

}

function loadProducts() {
  fetch(API + "/products")
    .then(res => res.json())
    .then(products => {
      const container = document.getElementById("products");
      container.innerHTML = "";

      products.forEach(p => {
        const imageHtml = p.image_url
          ? `<img src="${p.image_url}" alt="${p.name}">`
          : `<p>Sin imagen</p>`;

        container.innerHTML += `
          <div class="product">
            <h3>${p.name}</h3>
            <p>${p.description}</p>
            <strong>Precio: $${p.price}</strong>
            <br>
            ${imageHtml}
            <br><br>

            <a href="product.html?id=${p.id}">
              <button type="button">Ver detalle</button>
            </a>

            ${IS_ADMIN ? `
              <a href="product-edit.html?id=${p.id}">
                <button type="button">Editar</button>
              </a>

              <button class="deleteBtn" data-id="${p.id}" type="button">Eliminar</button>
            ` : ``}
          </div>
        `;
      });
    })
    .catch(() => {
      document.getElementById("products").innerHTML = "<p>Error cargando productos.</p>";
    });
}

document.getElementById("products").addEventListener("click", async (e) => {
  if (!IS_ADMIN) return;

  if (e.target.classList.contains("deleteBtn")) {
    const id = e.target.dataset.id;

    if (!confirm("¿Eliminar producto?")) return;

    const token = localStorage.getItem("token");

    const res = await fetch(API + "/products/" + id, {
      method: "DELETE",
      headers: {
        Authorization: "Bearer " + token,
        Accept: "application/json"
      }
    });

    if (!res.ok) {
      const data = await res.json();
      alert(data.message || "Error eliminando");
      return;
    }

    loadProducts();
  }
});

document.getElementById("newProductBtn").addEventListener("click", () => {
  if (!IS_ADMIN) return;
  window.location.href = "product-create.html";
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.removeItem("token");
  window.location.href = "login.html";
});

(async () => {
  await detectSessionAndAdmin();
  loadProducts();
})();
</script>

</body>
</html>

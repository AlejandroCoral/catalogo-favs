<form id="registerForm">
  <input type="text" id="name" placeholder="Nombre" required>
  <input type="email" id="email" placeholder="Correo" required>
  <input type="password" id="password" placeholder="Contraseña" required>
  <input type="password" id="password_confirmation" placeholder="Confirmar contraseña" required>
  <button type="submit">Registrarse</button>
</form>

<p id="msg"></p>

<script>
//const API = "http://127.0.0.1:8000/api";
const API = "https://catalogo-favs-production.up.railway.app/api";


document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    password_confirmation: document.getElementById("password_confirmation").value,
  };

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (!res.ok) {
    document.getElementById("msg").innerText = data.message || "Error al registrar";
    return;
  }

  // Si tu backend devuelve token:
  if (data.token) localStorage.setItem("token", data.token);

  document.getElementById("msg").innerText = "Registro exitoso ✅";
  window.location.href = "login.html"; // o directo a index.html si ya guardaste token
});
</script>

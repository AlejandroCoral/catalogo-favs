<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Mis Favoritos</title>
  <style>
    body{font-family:Arial;margin:40px;background:#f5f5f5}
    .product{background:#fff;padding:15px;margin:10px 0;border-radius:8px;box-shadow:0 0 5px rgba(0,0,0,.1)}
    img{max-width:120px}
    button{padding:8px 12px;cursor:pointer;margin-top:10px}
  </style>
</head>
<body>

<a href="./index.html">← Volver al catálogo</a>
<h1>Mis Favoritos</h1>

<p id="msg"></p>
<div id="list"></div>

<script type="module">
  import { apiFetch, getToken } from "./app.js";

  const token = getToken();
  const msg = document.getElementById("msg");
  const list = document.getElementById("list");

  if(!token){
    msg.textContent = "Debes iniciar sesión para ver favoritos.";
  } else {
    loadFavs();
  }

  async function loadFavs(){
    msg.textContent = "Cargando...";
    try{
      const favs = await apiFetch("/favorites");

      if(!favs || favs.length === 0){
        msg.textContent = "No tienes favoritos aún.";
        return;
      }

      msg.textContent = "";
      list.innerHTML = favs.map(f => {
        // Soporta varias formas comunes de respuesta
        const p = f.product || f;
        const id = p.id ?? f.product_id;

        return `
          <div class="product">
            <h3>${p.name ?? "Producto"}</h3>
            <p>${p.description ?? ""}</p>
            <strong>Precio: $${p.price ?? ""}</strong><br>
            ${p.image_url ? `<img src="${p.image_url}" />` : ""}
            <br><br>
            <a href="./product.html?id=${id}">
              <button>Ver detalle</button>
            </a>
          </div>
        `;
      }).join("");

    }catch(err){
      msg.textContent = err.message;
    }
  }
</script>

</body>
</html>
